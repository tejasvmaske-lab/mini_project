<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Inventory - LibCore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .main-dash {
            flex: 1;
            padding: 3rem;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--bg-surface);
            padding: 3rem;
            border-radius: 1.5rem;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.75rem; color: var(--primary); margin-bottom: 2.5rem;">
            <i class="fas fa-shield-alt"></i> LibAdmin
        </div>
        
        <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
            <a href="admin-inventory.html" class="nav-link active"><i class="fas fa-box"></i> Inventory Manager</a>
            <a href="admin-issue.html" class="nav-link"><i class="fas fa-exchange-alt"></i> Issue/Return Portal</a>
        </nav>

        <div style="margin-top: auto;">
            <a href="index.html" class="nav-link" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Exit Admin Portal</a>
        </div>
    </aside>

    <main class="main-content" style="padding: 3rem;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <div>
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Inventory Manager</h1>
                <p style="color: var(--text-muted);">Manage your library's physical and digital collection.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add New Book</button>
        </header>

        <div class="glass" style="padding: 2rem; border-radius: 1.5rem;">
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <input type="text" class="input-field" placeholder="Search inventory..." style="max-width: 400px;">
                <select class="input-field" style="width: 200px;">
                    <option>All Categories</option>
                    <option>Fiction</option>
                    <option>Tech</option>
                    <option>Science</option>
                </select>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Book ID</th>
                        <th>Preview</th>
                        <th>Title & Author</th>
                        <th>Category</th>
                        <th>Available Stock</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                    <!-- Dynamic Loading -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="book-modal">
    <div class="modal">
        <h2 style="margin-bottom: 1.5rem;" id="modal-title">Add New Book</h2>
        <form id="book-form">
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem;">Book Title</label>
                <input type="text" id="m-title" class="input-field" placeholder="e.g. Clean Code" required>
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem;">Author Name</label>
                <input type="text" id="m-author" class="input-field" placeholder="e.g. Robert C. Martin" required>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1.25rem;">
                <div style="flex: 1;">
                    <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem;">Category</label>
                    <select id="m-category" class="input-field">
                        <option>Fiction</option>
                        <option>Tech</option>
                        <option>Science</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem;">Initial Stock</label>
                    <input type="number" id="m-stock" class="input-field" value="1" min="1">
                </div>
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem;">Cover Image URL</label>
                <input type="url" id="m-cover" class="input-field" placeholder="https://unsplash.com/...">
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button type="button" class="btn" style="background: var(--bg-main);" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Book</button>
            </div>
        </form>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    const inventoryBody = document.getElementById('inventory-body');
    const modal = document.getElementById('book-modal');
    
    function renderInventory() {
        inventoryBody.innerHTML = window.LMS.books.map(book => `
            <tr>
                <td><strong>#LIB-${book.id.toString().padStart(4, '0')}</strong></td>
                <td><img src="${book.cover}" style="width: 40px; height: 60px; object-fit: cover; border-radius: 4px;"></td>
                <td>
                    <div style="font-weight: 600;">${book.title}</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">${book.author}</div>
                </td>
                <td>${book.category}</td>
                <td>
                    <span style="font-weight: 500;">5 / 10</span>
                </td>
                <td>
                    <div style="display: flex; gap: 1rem;">
                        <button class="btn" style="padding: 0.5rem; color: var(--primary); font-size: 1rem;"><i class="fas fa-edit"></i></button>
                        <button class="btn" style="padding: 0.5rem; color: var(--error); font-size: 1rem;"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function openModal() {
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
        document.getElementById('book-form').reset();
    }

    document.getElementById('book-form').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Book saved successfully! (Frontend Only)');
        closeModal();
    });

    // Close on overlay click
    modal.onclick = (e) => { if(e.target === modal) closeModal(); };

    renderInventory();
</script>
</body>
</html>
