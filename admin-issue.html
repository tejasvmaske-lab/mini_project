<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue/Return Portal - LibCore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .transaction-card {
            max-width: 600px;
            margin: 0 auto;
            padding: 3rem;
            border-radius: 2rem;
        }
        
        .transaction-card {
            max-width: 600px;
            margin: 0 auto;
            padding: 3rem;
            border-radius: 2rem;
        }
        .form-section {
            padding-bottom: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.75rem; color: var(--primary); margin-bottom: 2.5rem;">
            <i class="fas fa-shield-alt"></i> LibAdmin
        </div>
        
        <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
            <a href="admin-inventory.html" class="nav-link"><i class="fas fa-box"></i> Inventory Manager</a>
            <a href="admin-issue.html" class="nav-link active"><i class="fas fa-exchange-alt"></i> Issue/Return Portal</a>
        </nav>

        <div style="margin-top: auto;">
            <a href="index.html" class="nav-link" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Exit Admin Portal</a>
        </div>
    </aside>

    <main class="main-content" style="padding: 3rem;">
        <header style="margin-bottom: 3rem; text-align: center;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Issue & Return Portal</h1>
            <p style="color: var(--text-muted);">Process book transactions for students quickly and easily.</p>
        </header>

        <div class="transaction-card glass">
            <!-- Transaction Type Toggle -->
            <div style="display: flex; background: var(--bg-main); padding: 0.4rem; border-radius: 1rem; margin-bottom: 3rem;">
                <button id="type-issue" class="btn" style="flex: 1; border-radius: 0.75rem; background: var(--primary); color: white;">Issue Book</button>
                <button id="type-return" class="btn" style="flex: 1; border-radius: 0.75rem; color: var(--text-muted);">Return Book</button>
            </div>

            <form id="transaction-form">
                <div class="form-section">
                    <h3 style="margin-bottom: 1rem; font-size: 1rem;">Student Details</h3>
                    <div style="display: flex; gap: 1rem;">
                        <div style="flex: 1;">
                            <label style="display: block; font-size: 0.8rem; margin-bottom: 0.5rem;">Student ID</label>
                            <input type="text" id="t-student-id" class="input-field" placeholder="LMS-12345" required>
                        </div>
                        <button type="button" class="btn" style="background: var(--bg-main); margin-top: 1.5rem;"><i class="fas fa-search"></i> Check</button>
                    </div>
                </div>

                <div class="form-section">
                    <h3 style="margin-bottom: 1rem; font-size: 1rem;">Book Details</h3>
                    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <div style="flex: 1;">
                            <label style="display: block; font-size: 0.8rem; margin-bottom: 0.5rem;">Book ID or ISBN</label>
                            <input type="text" id="t-book-id" class="input-field" placeholder="ISBN-978..." required>
                        </div>
                        <button type="button" class="btn" style="background: var(--bg-main); margin-top: 1.5rem;"><i class="fas fa-barcode"></i> Scan</button>
                    </div>
                </div>

                <div id="issue-fields">
                    <div style="margin-bottom: 2rem;">
                        <label style="display: block; font-size: 0.8rem; margin-bottom: 0.5rem;">Duration (Weeks)</label>
                        <select id="t-duration" class="input-field">
                            <option value="1">1 Week</option>
                            <option value="2" selected>2 Weeks</option>
                            <option value="4">4 Weeks</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; padding: 1.25rem;">
                    Confirm Book Issue
                </button>
            </form>
        </div>
    </main>
</div>

<script src="js/main.js"></script>
<script>
    const typeIssue = document.getElementById('type-issue');
    const typeReturn = document.getElementById('type-return');
    const issueFields = document.getElementById('issue-fields');
    const submitBtn = document.getElementById('submit-btn');

    typeIssue.addEventListener('click', () => setType('issue'));
    typeReturn.addEventListener('click', () => setType('return'));

    function setType(type) {
        if (type === 'issue') {
            typeIssue.style.background = 'var(--primary)';
            typeIssue.style.color = 'white';
            typeReturn.style.background = 'transparent';
            typeReturn.style.color = 'var(--text-muted)';
            issueFields.style.display = 'block';
            submitBtn.innerText = 'Confirm Book Issue';
            submitBtn.style.background = 'var(--primary)';
        } else {
            typeReturn.style.background = 'var(--primary)';
            typeReturn.style.color = 'white';
            typeIssue.style.background = 'transparent';
            typeIssue.style.color = 'var(--text-muted)';
            issueFields.style.display = 'none';
            submitBtn.innerText = 'Confirm Book Return';
            submitBtn.style.background = 'var(--success)';
        }
    }

    document.getElementById('transaction-form').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Transaction processed successfully! (Frontend Only)');
        document.getElementById('transaction-form').reset();
    });
</script>
</body>
</html>
