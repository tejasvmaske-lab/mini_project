<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Library Discovery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .top-nav {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(rgba(var(--primary-hue), 70%, 55%, 0.05), transparent);
        }
        .search-container {
            max-width: 600px;
            margin: 2rem auto 0;
            position: relative;
        }
        .search-container i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-container .input-field {
            padding-left: 3rem;
            height: 3.5rem;
            font-size: 1.1rem;
            border-radius: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<nav class="top-nav glass">
    <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.5rem; color: var(--primary);">
        <i class="fas fa-book-reader"></i> LibCore
    </div>
    <div style="display: flex; gap: 2rem; align-items: center;">
        <a href="home.html" class="nav-link active" style="margin: 0;">Discover</a>
        <a href="student-dashboard.html" class="nav-link" style="margin: 0;">My Books</a>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--border); overflow: hidden;">
            <img src="https://ui-avatars.com/api/?name=Student+User&background=6366f1&color=fff" alt="User">
        </div>
    </div>
</nav>

<section class="hero">
    <h1 style="font-size: 3.5rem; margin-bottom: 1rem;">Find Your Next Read</h1>
    <p style="color: var(--text-muted); font-size: 1.25rem;">Search through thousands of digital and physical library resources.</p>
    
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="book-search" class="input-field" placeholder="Search by title, author, or ISBN...">
    </div>
</section>

<main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 style="font-size: 1.5rem;">Popular in Tech</h2>
        <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">All</button>
            <button class="btn" style="background: var(--bg-surface); border: 1px solid var(--border); padding: 0.5rem 1rem; font-size: 0.9rem;">Sci-Fi</button>
            <button class="btn" style="background: var(--bg-surface); border: 1px solid var(--border); padding: 0.5rem 1rem; font-size: 0.9rem;">History</button>
        </div>
    </div>

    <div class="books-grid" id="books-grid">
        <!-- JS will populate this -->
    </div>
</main>

<script src="js/main.js"></script>
<script>
    const booksGrid = document.getElementById('books-grid');
    const searchInput = document.getElementById('book-search');

    function renderBooks(books) {
        booksGrid.innerHTML = books.map(book => `
            <div class="book-card glass" onclick="location.href='book-details.html?id=${book.id}'">
                <img src="${book.cover}" class="book-img" alt="${book.title}">
                <div class="book-info">
                    <span class="badge ${book.status === 'Available' ? 'badge-success' : 'badge-warning'}">${book.status}</span>
                    <h3 style="margin: 0.5rem 0 0.25rem; font-size: 1.1rem;">${book.title}</h3>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">${book.author}</p>
                </div>
            </div>
        `).join('');
    }

    // Initial render
    renderBooks(window.LMS.books);

    // Search logic
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = window.LMS.books.filter(b => 
            b.title.toLowerCase().includes(query) || 
            b.author.toLowerCase().includes(query)
        );
        renderBooks(filtered);
    });
</script>
</body>
</html>
